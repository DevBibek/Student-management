{% extends 'base.html' %}
{% load static %}

{% block title %}
addstudent
{% endblock title %}

{% block content %}
<div class="container mt-2">
    <div class="row justify-content-center">
        <div class="col-5">
            <h3 class="text-center bg-primary py-2 mt-2 fw-bold">Add Student</h3>
         {% if messages %}
         {% for m in messages %}
         {% if m.tags == "error" %}
         <p style="color: red;">m</p>
         {% endif %}
         {% endfor %}
         {% endif %}
        <form method="POST" action="">
            {% csrf_token %}
            <div class="mt-2">
                <label for="sname" class="form-label"> Student Name</label>
                <input type="text" name="sname" class="form-control" placeholder="Enter student full name " required>
            </div>
            <div class="mt-2">
                <label for="age" class="form-label"> Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter student age" id="" required>
            </div>
            <div class="mt-2">
                <label for="rollnumber" class="form-label"> Roll.N</label>
                <input type="number" name="rollnumber" class="form-control" 
                placeholder ="Enter student roll number" id="" required >
            </div>
            <div class="mt-2">
                <label for="address" class="form-label"> Address</label>
                <input type="text" name="address" class =" form-control" placeholder="Enter student address">
            </div>
            <div class="mt-2">
                <button type="submit" class="text-center btn btn-success py-2">Add</button>
            </div>

        </form>
        </div>
    </div>`
{% endblock content %}
